<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediRoute — Healthcare Triage</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ee; --surface: #ffffff; --border: #e2ddd8;
      --text: #1a1714; --muted: #8a837c; --accent: #1d6a5b; --accent-lt: #e8f4f1;
      --mild: #2d7a3a; --mild-bg: #eaf5eb;
      --mod: #b06c00;  --mod-bg: #fff8e6;
      --sev: #c0392b;  --sev-bg: #fdecea;
      --bubble-user: #1d6a5b; --bubble-bot: #ffffff; --radius: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 12px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
    .logo-text h1 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; letter-spacing: -0.02em; line-height: 1; }
    .logo-text span { font-size: 0.72rem; color: var(--muted); font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; }
    .header-badge { margin-left: auto; background: var(--accent-lt); color: var(--accent); font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 99px; letter-spacing: 0.03em; }
    .app { display: flex; flex: 1; max-width: 820px; margin: 0 auto; width: 100%; flex-direction: column; padding: 0 16px; }
    #chat { flex: 1; overflow-y: auto; padding: 28px 0 16px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; font-size: 15px; flex-shrink: 0; align-self: flex-end; }
    .msg.bot  .avatar { background: var(--accent); }
    .msg.user .avatar { background: var(--text); color: #fff; }
    .bubble { max-width: 72%; padding: 13px 17px; border-radius: var(--radius); font-size: 0.92rem; line-height: 1.6; }
    .msg.bot  .bubble { background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }

    /* Triage card */
    .triage-card { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-top: 4px; animation: fadeUp 0.4s ease; }
    .triage-header { padding: 14px 18px; font-family: 'DM Serif Display', serif; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .triage-header .badge { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 99px; }
    .triage-body { background: var(--surface); padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
    .triage-row { display: flex; gap: 10px; font-size: 0.88rem; }
    .triage-label { font-weight: 600; color: var(--muted); min-width: 130px; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; padding-top: 2px; }
    .triage-value { color: var(--text); line-height: 1.5; }
    .disclaimer { font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); padding: 10px 18px; background: var(--bg); }
    .level-mild     { background: var(--mild-bg); }
    .level-mild     .triage-header { color: var(--mild); }
    .level-mild     .badge { background: var(--mild); color: #fff; }
    .level-moderate { background: var(--mod-bg); }
    .level-moderate .triage-header { color: var(--mod); }
    .level-moderate .badge { background: var(--mod); color: #fff; }
    .level-severe   { background: var(--sev-bg); }
    .level-severe   .triage-header { color: var(--sev); }
    .level-severe   .badge { background: var(--sev); color: #fff; }

    /* Facilities card */
    .facilities-card { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-top: 8px; animation: fadeUp 0.4s ease; }
    .facilities-header { padding: 12px 18px; background: var(--accent); color: #fff; font-weight: 600; font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }
    .facility-item { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; gap: 4px; }
    .facility-item:last-child { border-bottom: none; }
    .facility-name { font-weight: 600; font-size: 0.9rem; }
    .facility-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .facility-open   { color: var(--mild); font-weight: 600; }
    .facility-closed { color: var(--sev);  font-weight: 600; }
    .facility-link { font-size: 0.78rem; color: var(--accent); text-decoration: none; font-weight: 600; margin-top: 2px; display: inline-block; }
    .facility-link:hover { text-decoration: underline; }
    .loc-btn { margin-top: 10px; background: var(--accent-lt); color: var(--accent); border: 1px solid var(--accent); border-radius: 99px; padding: 7px 16px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .loc-btn:hover { background: var(--accent); color: #fff; }

    /* Typing */
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 16px 18px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input */
    .input-bar { padding: 16px 0 24px; display: flex; gap: 10px; align-items: flex-end; }
    #user-input { flex: 1; resize: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; background: var(--surface); color: var(--text); outline: none; transition: border 0.2s; max-height: 120px; line-height: 1.5; }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }
    #send-btn { width: 46px; height: 46px; border-radius: 13px; background: var(--accent); border: none; cursor: pointer; display: grid; place-items: center; transition: background 0.2s, transform 0.1s; flex-shrink: 0; }
    #send-btn:hover { background: #165a4c; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }
    .reset-btn { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; font-size: 0.78rem; color: var(--muted); cursor: pointer; margin-left: auto; transition: all 0.2s; }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
    .input-top { display: flex; align-items: center; padding: 8px 0 4px; }
    .input-hint { font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="logo-icon">🏥</div>
  <div class="logo-text">
    <h1>MediRoute</h1>
    <span>Healthcare Triage Assistant</span>
  </div>
  <div class="header-badge">AI Powered</div>
</header>

<div class="app">
  <div id="chat"></div>
  <div class="input-top">
    <span class="input-hint">Describe your symptoms in any language</span>
    <button class="reset-btn" onclick="resetChat()">↺ New session</button>
  </div>
  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="e.g. Saya sakit kepala sudah 2 hari..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  let history = [];
  let userLat = null, userLng = null;

  const chat    = document.getElementById("chat");
  const input   = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendMsg(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="avatar">${role === "bot" ? "🏥" : "👤"}</div><div class="bubble">${text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "msg bot typing"; div.id = "typing";
    div.innerHTML = `<div class="avatar">🏥</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

  function parseTriage(text) {
    if (!text.includes("TRIAGE_RESULT:")) return null;
    const result = {};
    for (const line of text.split("\n")) {
      const l = line.trim();
      if (l.startsWith("- Level:"))          result.level          = l.replace("- Level:", "").trim();
      if (l.startsWith("- Reason:"))         result.reason         = l.replace("- Reason:", "").trim();
      if (l.startsWith("- Recommendation:")) result.recommendation = l.replace("- Recommendation:", "").trim();
      if (l.startsWith("- Message:"))        result.message        = l.replace("- Message:", "").trim();
    }
    return Object.keys(result).length ? result : null;
  }

  function renderTriage(triage) {
    const icons = { MILD: "🟢", MODERATE: "🟡", SEVERE: "🔴" };
    const cls   = { MILD: "level-mild", MODERATE: "level-moderate", SEVERE: "level-severe" };
    const level = triage.level || "UNKNOWN";
    const card  = document.createElement("div");
    card.className = `triage-card ${cls[level] || ""}`;
    card.innerHTML = `
      <div class="triage-header">${icons[level] || "⚪"} Triage Assessment <span class="badge">${level}</span></div>
      <div class="triage-body">
        <div class="triage-row"><span class="triage-label">Reason</span><span class="triage-value">${triage.reason || "-"}</span></div>
        <div class="triage-row"><span class="triage-label">Recommendation</span><span class="triage-value">${triage.recommendation || "-"}</span></div>
        <div class="triage-row"><span class="triage-label">Message</span><span class="triage-value">${triage.message || "-"}</span></div>
        <button class="loc-btn" onclick="findFacilities('${level}')">📍 Find nearby facilities</button>
      </div>
      <div class="disclaimer">⚠️ MediRoute is not a substitute for professional medical advice. Always consult a doctor.</div>`;
    chat.appendChild(card);
    chat.scrollTop = chat.scrollHeight;
  }

  async function findFacilities(level) {
    if (!navigator.geolocation) {
      appendMsg("bot", "Geolocation is not supported by your browser.");
      return;
    }
    navigator.geolocation.getCurrentPosition(async pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      showTyping();
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "find_facilities", lat: userLat, lng: userLng, triageLevel: level })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) { appendMsg("bot", `Sorry, couldn't find facilities: ${data.error}`); return; }
      renderFacilities(data.facilities, level);
    }, () => {
      appendMsg("bot", "Location access denied. Please enable location to find nearby facilities.");
    });
  }

  function renderFacilities(facilities, level) {
    const labels = { MILD: "Nearby Pharmacies", MODERATE: "Nearby Clinics & Puskesmas", SEVERE: "Nearby Hospitals & IGD" };
    const card = document.createElement("div");
    card.className = "facilities-card";
    const items = facilities.length === 0
      ? `<div class="facility-item"><span class="facility-name">No facilities found nearby.</span></div>`
      : facilities.map(f => `
          <div class="facility-item">
            <span class="facility-name">${f.name}</span>
            <div class="facility-meta">
              <span>📍 ${f.address}</span>
              ${f.rating ? `<span>⭐ ${f.rating}</span>` : ""}
              ${f.open === true ? `<span class="facility-open">● Open now</span>` : f.open === false ? `<span class="facility-closed">● Closed</span>` : ""}
            </div>
            <a class="facility-link" href="${f.mapsUrl}" target="_blank">Open in Google Maps →</a>
          </div>`).join("");
    card.innerHTML = `<div class="facilities-header">📍 ${labels[level] || "Nearby Facilities"}</div>${items}`;
    chat.appendChild(card);
    chat.scrollTop = chat.scrollHeight;
  }

  async function callAPI(body) {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.reply;
  }

  async function init() {
    sendBtn.disabled = true;
    showTyping();
    const greeting = await callAPI({ messages: [{ role: "user", content: "Hello" }] });
    removeTyping();
    history.push({ role: "assistant", content: greeting });
    appendMsg("bot", greeting);
    sendBtn.disabled = false;
    input.focus();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    input.value = ""; input.style.height = "auto";
    appendMsg("user", text);
    history.push({ role: "user", content: text });
    sendBtn.disabled = true;
    showTyping();
    const reply = await callAPI({ messages: history });
    removeTyping();
    history.push({ role: "assistant", content: reply });
    const triage = parseTriage(reply);
    if (triage) {
      const clean = reply.split("TRIAGE_RESULT:")[0].trim();
      if (clean) appendMsg("bot", clean);
      renderTriage(triage);
    } else {
      appendMsg("bot", reply);
    }
    sendBtn.disabled = false;
    input.focus();
  }

  function resetChat() { history = []; chat.innerHTML = ""; init(); }
  init();
</script>
</body>
</html>
